<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analog Clock</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/7aa16a557b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container">
      <div class="music-player">
        <nav>
          <div class="circle">
            <i class="fa-solid fa-angle-left"></i>

            <i class="fa-solid fa-bars"></i>
          </div>
        </nav>
        <img src="img/music-player.png" class="song-img">
        <h1>Nadaan Parinde</h1>
        <p>A. R. Rahman | Mohit Chauhan</p>
      </div>
    </div>
