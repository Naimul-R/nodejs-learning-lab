<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/7aa16a557b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container">
      <div class="music-player">
        <nav>
          <div class="circle">
            <i class="fa-solid fa-angle-left"></i>
          </div>
          <div class="circle">
            <i class="fa-solid fa-bars"></i>
          </div>
        </nav>
        <img src="img/music-player.png" class="song-img">
        <h1>Nadaan Parinde</h1>
        <p>A. R. Rahman | Mohit Chauhan</p>

        <audio controls id="song">
          <source src="music/Nadan-Parinde.mp3" type="audio/mpeg">
        </audio>
        <input type="range" value="0" id="progress">
        <div class="controls">
          <div><i class="fa-solid fa-backward"></i></div>
          <div onclick="PlayPause()"><i class="fa-solid fa-play" id="ctrlIcons"></i></div>
          <div><i class="fa-solid fa-forward"></i></div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
